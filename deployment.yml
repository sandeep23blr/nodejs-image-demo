apiVersion: apps/v1
kind: Deployment
metadata:
  name: shark-deployment
  labels:
    app: sharksample
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sharksample
  template:
    metadata:
      labels:
        app: sharksample
    spec:
      containers:
      - name: shark
        image: sharksample:v1
        volumeMounts:
        - name: db-connections
          mountPath: /opt
        ports:
        - containerPort: 8082

      volumes:
      - name: db-connections
        configMap:
          name: test-cm
